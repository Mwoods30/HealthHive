name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-desktop:
    name: Release Desktop ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            label: macos-intel
          - os: macos-14
            label: macos-apple-silicon
          - os: windows-latest
            label: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build desktop bundle
        run: npm run tauri:build

      - name: Collect desktop artifacts
        run: node scripts/collect-native-artifacts.mjs ${{ matrix.label }} release-artifacts

      - name: Upload desktop release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: release-artifacts
          if-no-files-found: error

  release-android:
    name: Release Android Debug APK
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          npm ci
          npm run tauri:android:licenses
          sdkmanager "ndk;29.0.14206865"

      - name: Build Android APK
        run: npm run tauri:android:apk

      - name: Collect Android release artifact
        run: node scripts/collect-native-artifacts.mjs android-debug release-artifacts

      - name: Upload Android release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android-debug
          path: release-artifacts
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - release-desktop
      - release-android

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: release-artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*
          generate_release_notes: true
