name: Native Builds

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/native-builds.yml"
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - "scripts/**"
      - "src/**"
      - "src-tauri/**"
  pull_request:
    paths:
      - ".github/workflows/native-builds.yml"
      - "package.json"
      - "package-lock.json"
      - "public/**"
      - "scripts/**"
      - "src/**"
      - "src-tauri/**"

permissions:
  contents: read

jobs:
  web-check:
    name: Web Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build web app
        run: npm run build

  desktop-build:
    name: Desktop ${{ matrix.label }}
    needs: web-check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            label: macos-intel
          - os: macos-14
            label: macos-apple-silicon
          - os: windows-latest
            label: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Native environment report
        run: npm run tauri:doctor

      - name: Build desktop bundle
        run: npm run tauri:build

      - name: Collect desktop artifacts
        run: node scripts/collect-native-artifacts.mjs ${{ matrix.label }} release-artifacts

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: healthhive-${{ matrix.label }}
          path: release-artifacts
          if-no-files-found: error

  android-build:
    name: Android Debug APK
    needs: web-check
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android dependencies
        run: |
          npm ci
          npm run tauri:android:licenses
          sdkmanager "ndk;29.0.14206865"

      - name: Native environment report
        run: npm run tauri:doctor

      - name: Build Android APK
        run: npm run tauri:android:apk

      - name: Collect Android artifacts
        run: node scripts/collect-native-artifacts.mjs android-debug release-artifacts

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: healthhive-android-debug
          path: release-artifacts
          if-no-files-found: error

  ios-simulator-build:
    name: iOS Simulator Build
    needs: web-check
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Native environment report
        run: npm run tauri:doctor

      - name: Build iOS simulator app
        run: npm run tauri:ios:sim

      - name: Collect iOS simulator artifacts
        run: node scripts/collect-native-artifacts.mjs ios-sim release-artifacts

      - name: Upload iOS simulator artifacts
        uses: actions/upload-artifact@v4
        with:
          name: healthhive-ios-simulator
          path: release-artifacts
          if-no-files-found: error
